spring.application.name=weather-forecast

server.port=8080

# Replace with your actual OpenWeatherMap API key
# Recommended: set an environment variable OPENWEATHER_API_KEY instead of hardcoding.
# Windows (PowerShell): $env:OPENWEATHER_API_KEY="your_key_here"
openweather.api.key=${OPENWEATHER_API_KEY:}
openweather.api.base-url=https://api.openweathermap.org/data/2.5

spring.cache.type=caffeine
spring.cache.cache-names=currentWeather,forecast
spring.cache.caffeine.spec=maximumSize=100,expireAfterWrite=600s

spring.thymeleaf.cache=false

